<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка 500 - Внутренняя ошибка сервера</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; color: #343a40; text-align: center; }
        .container { max-width: 600px; padding: 20px; }
        h1 { font-size: 10rem; margin: 0; font-weight: 700; color: #6c757d; }
        h2 { font-size: 2rem; margin-top: 0; }
        p { font-size: 1.2rem; }
        a { color: #007bff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>500</h1>
    <h2>Что-то пошло не так...</h2>
    <p class="error-message" th:text="${errorMessage}">
        Мы уже работаем над устранением проблемы.
    </p>
    <a href="/" th:href="@{/}">Вернуться на главную</a>
</div>
</body>
</html>
