<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <title th:text="'Комментарии к книге «' + ${book.title} + '»'">Комментарии к книге</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        table {
            width: 80%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: left;
        }
        thead {
            background-color: #4CAF50;
            color: white;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tbody tr:hover {
            background-color: #f1f1f1;
        }
        .empty-message {
            color: #888;
            font-style: italic;
            margin-top: 20px;
            font-size: 1.1em;
        }
        .book-title {
            color: #2a5db0;
            font-style: italic;
        }
        a.back-link {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 15px;
            background-color: #555;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        a.back-link:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

<h1>
    Комментарии к книге: <span class="book-title" th:text="${book.title}">Название книги</span>
</h1>

<div th:if="${!comments.isEmpty()}">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Текст комментария</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comment : ${comments}">
            <td th:text="${comment.id}">101</td>
            <td th:text="${comment.text}">Отличная книга</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:if="${comments.isEmpty()}">
    <p class="empty-message">У этой книги еще нет комментариев</p>
</div>

<a href="/books" th:href="@{/books}" class="back-link">Вернуться к списку книг</a>

</body>
</html>
