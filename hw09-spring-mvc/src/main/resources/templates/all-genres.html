<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список жанров</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f9; }
        h1 { color: #333; }
        table { width: 60%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; border: 1px solid #ddd; text-align: left; }
        thead { background-color: #4CAF50; color: white; }
        tbody tr:nth-child(even) { background-color: #f2f2f2; }
        tbody tr:hover { background-color: #ddd; }
        .empty-message { color: #888; font-style: italic; }
    </style>
</head>
<body>

<h1>Список всех жанров</h1>

<div th:if="${!genres.isEmpty()}">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="genre : ${genres}">
            <td th:text="${genre.id}">1</td>
            <td th:text="${genre.name}">Фантастика</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:if="${genres.isEmpty()}">
    <p class="empty-message">Жанры пока не добавлены</p>
</div>

</body>
</html>
