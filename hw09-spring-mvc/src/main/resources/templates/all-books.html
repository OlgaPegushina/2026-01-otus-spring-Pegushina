<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Библиотека</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 960px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: left;
        }
        thead {
            background-color: #4CAF50;
            color: white;
        }
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tbody tr:hover {
            background-color: #f1f1f1;
        }
        .actions a {
            color: #007bff;
            text-decoration: none;
            margin-right: 10px;
        }
        .actions a:hover {
            text-decoration: underline;
        }
        .actions .comments-link {
            color: #17a2b8;
        }
        .actions .delete {
            color: #dc3545;
        }
        .empty-message {
            color: #888;
            font-style: italic;
            margin-top: 20px;
            text-align: center;
            font-size: 1.1em;
        }
        .add-button {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .add-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span>Каталог книг в библиотеке</span>
        <a th:href="@{/books/new}" class="add-button">Добавить книгу</a>
    </h1>

    <div th:if="${!books.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Автор</th>
                <th>Жанры</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}">1</td>
                <td>
                    <!-- Оборачиваем название в ссылку на детальную страницу -->
                    <a th:href="@{/books/{id}(id=${book.id})}"
                       th:text="${book.title}">
                        Название книги
                    </a>
                </td>
                <td th:text="${book.author.fullName}">Автор</td>
                <td>
                    <span th:text="${#strings.listJoin(book.genres.![name], ', ')}">Роман, Эпопея</span>
                </td>
                <td class="actions">
                    <a th:href="@{/books/{id}(id=${book.id})}" class="comments-link">Комментарии</a>
                    <a th:href="@{/books/edit/{id}(id=${book.id})}">Изменить</a>
                    <form th:method="post" th:action="@{/books/delete/{id}(id=${book.id})}" style="display: inline;">
                        <button type="submit" class="delete" style="background:none; border:none; padding:0; font: inherit; cursor: pointer; text-decoration: underline;">
                            Удалить
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${books.isEmpty()}">
        <p class="empty-message">В библиотеке пока нет ни одной книги</p>
    </div>
</div>

</body>
</html>
